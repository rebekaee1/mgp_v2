server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Limit request body size (chat messages shouldn't exceed 16KB)
    client_max_body_size 16k;

    # --- Static frontend files ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /frontend/ {
        alias /usr/share/nginx/html/;
    }

    # --- Block internal endpoints from external access ---
    location /api/metrics {
        return 403;
    }
    location /api/status {
        return 403;
    }

    # --- Proxy API to backend ---
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- SSE streaming endpoint ---
    location /api/chat/stream {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # --- Favicon ---
    location = /favicon.ico {
        proxy_pass http://backend:8080;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://static.tourvisor.ru data:; connect-src 'self'; font-src 'self'; frame-ancestors 'self'" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
