# HTTP → HTTPS redirect
server {
    listen 80;
    server_name lk.navilet.ru;
    return 301 https://$host$request_uri;
}

# Fallback for IP access
server {
    listen 80 default_server;
    server_name _;
    return 301 https://lk.navilet.ru$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name lk.navilet.ru;

    ssl_certificate /etc/letsencrypt/live/lk.navilet.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lk.navilet.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # --- Dashboard SPA (root) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets — aggressive caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Backend static files (logos, presets) ---
    location /static/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Proxy API to backend ---
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Favicon ---
    location = /favicon.ico {
        try_files $uri =404;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
