services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mgp}
      POSTGRES_USER: ${POSTGRES_USER:-mgp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    command: >
      postgres
      -c shared_buffers=${PG_SHARED_BUFFERS:-64MB}
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=${PG_EFFECTIVE_CACHE:-256MB}
      -c max_connections=${PG_MAX_CONN:-100}
      -c wal_buffers=2MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c log_min_duration_statement=1000
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mgp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mgp-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-64mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme_redis}
      --save 900 1
      --save 300 10
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 96M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - mgp-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mgp}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mgp}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0}
      RUNTIME_MODE: ${RUNTIME_MODE:-backend-only}
      LK_WIDGET_LOADER_URL: ${LK_WIDGET_LOADER_URL:-https://lk.navilet.ru/widget-loader.js}
    ports:
      - "${APP_PORT:-80}:8080"
    volumes:
      - ./logs:/app/logs
      - ./sync_key:/opt/lk-aimpact/sync_key:ro
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - mgp-net

  max_bridge:
    build:
      context: .
      dockerfile: services/max_bridge/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MAX_BACKEND_INTERNAL_URL: ${MAX_BACKEND_INTERNAL_URL:-http://backend:8080}
      MAX_REDIS_URL: ${MAX_REDIS_URL:-redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/1}
      MAX_BACKEND_SERVICE_TOKEN: ${MAX_BACKEND_SERVICE_TOKEN:-${RUNTIME_SERVICE_AUTH_SECRET:-}}
      MAX_LOG_LEVEL: ${MAX_LOG_LEVEL:-INFO}
    ports:
      - "${MAX_WEBHOOK_LISTEN_PORT:-8090}:8090"
    deploy:
      resources:
        limits:
          memory: 192M
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mgp-net

volumes:
  pgdata:
  redisdata:

networks:
  mgp-net:
    driver: bridge
